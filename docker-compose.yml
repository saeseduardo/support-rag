services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: supportrag-db
    environment:
      POSTGRES_DB: supportrag
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d supportrag"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: supportrag-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
