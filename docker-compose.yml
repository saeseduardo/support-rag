services:
  app:
    build: .
    container_name: supportrag-app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://dev:dev@postgres:5432/supportrag
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    container_name: supportrag-db
    environment:
      POSTGRES_DB: supportrag
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d supportrag"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: supportrag-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
